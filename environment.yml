name: workshop-user-image
# This is the standard conda configuration file. Use this file to list
# the conda packages that you need installed in your environment.
channels:
  - conda-forge

dependencies:
  - ipywidgets==8.1.8
  # The .NET SDK is installed from apt instead of conda-forge (see apt.txt):
  # conda-forge's dotnet-sdk ships only the base .NET runtime, but the
  # Microsoft.dotnet-interactive kernel is an ASP.NET Core app and needs the
  # Microsoft.AspNetCore.App shared framework, which the apt package provides.
